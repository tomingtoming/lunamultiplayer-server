services:
  lunamultiplayer-server:
    build: .
    container_name: lunamultiplayer-server
    network_mode: host
    volumes:
      - ./server-data:/app/LMPServer/Universe
      - ./server-config:/app/LMPServer/Config
    restart: unless-stopped
    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 3G